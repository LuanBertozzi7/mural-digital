services:
  postgres:
    image: postgres:16
    container_name: mural_db
    environment:
      POSTGRES_USER: mural
      POSTGRES_PASSWORD: mural
      POSTGRES_DB: mural
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: mural_app
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: "postgresql://mural:mural@postgres:5432/mural"
    depends_on:
      - postgres

volumes:
  postgres_data:
